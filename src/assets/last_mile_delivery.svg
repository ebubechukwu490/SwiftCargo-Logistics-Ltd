<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" fill="none">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FA" />
      <stop offset="100%" stop-color="#E9ECEF" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#133B6B" />
      <stop offset="100%" stop-color="#0B2545" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F39C12" />
      <stop offset="100%" stop-color="#E67E22" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B2545" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="url(#bgGrad)" />

  <!-- Isometric Grid / Tech Lines -->
  <g opacity="0.3">
    <path d="M-100 250 L900 250" stroke="#DEE2E6" stroke-width="1" />
    <path d="M400 -50 L400 550" stroke="#DEE2E6" stroke-width="1" />
    <path d="M 0,100 L 800,500" stroke="#DEE2E6" stroke-width="2" />
    <path d="M 0,200 L 800,600" stroke="#DEE2E6" stroke-width="2" />
    <path d="M 0,0 L 800,400" stroke="#DEE2E6" stroke-width="2" />
    <path d="M 0,400 L 800,0" stroke="#DEE2E6" stroke-width="2" />
    <path d="M 0,500 L 800,100" stroke="#DEE2E6" stroke-width="2" />
    <path d="M 0,300 L 800,-100" stroke="#DEE2E6" stroke-width="2" />
  </g>

  <!-- Isometric Building / Block representing destination -->
  <g transform="translate(550, 180)" filter="url(#dropShadow)">
    <!-- Back Building -->
    <path d="M 0,-40 L 50,-65 L 100,-40 L 100,40 L 50,65 L 0,40 Z" fill="#DEE2E6" />
    <path d="M 0,-40 L 50,-15 L 100,-40" stroke="#CED4DA" stroke-width="1.5" />
    <!-- Front Building (Accent) -->
    <path d="M -80,20 L -30,-5 L 20,20 L 20,100 L -30,120 L -80,100 Z" fill="url(#primaryGrad)" />
    <!-- Top Face of Front Building -->
    <path d="M -80,20 L -30,-5 L 20,20 L -30,45 Z" fill="#1A4A80" />
    <path d="M -30,45 L -30,120" stroke="#071A30" stroke-width="1" opacity="0.3" />
    <!-- Building Windows -->
    <path d="M -60,45 L -45,38 L -45,58 L -60,65 Z" fill="#FFFFFF" opacity="0.15" />
    <path d="M -60,75 L -45,68 L -45,88 L -60,95 Z" fill="#FFFFFF" opacity="0.15" />
    <path d="M -10,45 L 5,38 L 5,58 L -10,65 Z" fill="#FFFFFF" opacity="0.15" />
    <path d="M -10,75 L 5,68 L 5,88 L -10,95 Z" fill="#FFFFFF" opacity="0.15" />
  </g>

  <!-- Route Line (Dashed) -->
  <path d="M 150,350 L 300,275 L 420,335 L 520,200" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8" />
  
  <!-- Pulsing Route Nodes -->
  <circle cx="150" cy="350" r="8" fill="#E67E22" />
  <circle cx="150" cy="350" r="16" stroke="#E67E22" stroke-width="2" opacity="0.4" />
  
  <circle cx="300" cy="275" r="5" fill="#0B2545" />
  <circle cx="420" cy="335" r="5" fill="#0B2545" />

  <!-- Delivery Pin / Destination Marker -->
  <g transform="translate(520, 200)" filter="url(#dropShadow)">
    <g transform="translate(0, -40)">
      <path d="M 0,0 C -20,-20 -20,-45 0,-45 C 20,-45 20,-20 0,0 Z" fill="url(#accentGrad)" />
      <circle cx="0" cy="-25" r="7" fill="#FFFFFF" />
    </g>
    <ellipse cx="0" cy="0" rx="12" ry="6" fill="#0B2545" opacity="0.2" />
  </g>

  <!-- Stylized Isometric Delivery Van -->
  <g transform="translate(260, 240)" filter="url(#dropShadow)">
    <!-- Wheels -->
    <ellipse cx="-25" cy="25" rx="10" ry="6" fill="#212529" />
    <ellipse cx="25" cy="45" rx="10" ry="6" fill="#212529" />

    <!-- Van Body -->
    <path d="M -45,10 L 15,-20 L 55,0 L 55,25 L -5,45 L -45,25 Z" fill="url(#primaryGrad)" />
    
    <!-- Cabin -->
    <path d="M 15,-20 L 35,-10 L 35,5 L 15,-5 Z" fill="#212529" opacity="0.8" />
    <path d="M 35,-10 L 50,-3 L 50,12 L 35,5 Z" fill="#495057" opacity="0.9" />
    <path d="M 38,-6 L 47,-2 L 47,4 L 38,0 Z" fill="#FFFFFF" opacity="0.3" />

    <!-- Cargo Box -->
    <path d="M -42,-15 L 12,-42 L 12,12 L -42,39 Z" fill="#FFFFFF" />
    <path d="M -42,-15 L -42,39 L -45,37 L -45,-17 Z" fill="#DEE2E6" />
    <path d="M -42,-15 L 12,-42 L 15,-40 L -39,-13 Z" fill="#F1F3F5" />
    
    <!-- Orange accent stripe -->
    <path d="M -30,15 L 0,0 L 0,5 L -30,20 Z" fill="url(#accentGrad)" />
    
    <!-- Abstract text lines representing SwiftCargo brand -->
    <rect x="-25" y="0" width="12" height="3" transform="skewY(-27)" fill="#0B2545" />
    <rect x="-10" y="0" width="8" height="3" transform="skewY(-27)" fill="#E67E22" />
  </g>
  
  <!-- Location package overlay -->
  <g transform="translate(130, 270)" filter="url(#dropShadow)">
    <path d="M 0,-15 L 20,-25 L 40,-15 L 40,10 L 20,20 L 0,10 Z" fill="url(#accentGrad)" />
    <path d="M 0,-15 L 20,-5 L 40,-15" stroke="#FFFFFF" stroke-width="1.5" />
    <path d="M 20,-5 L 20,20" stroke="#FFFFFF" stroke-width="1.5" />
  </g>
</svg>
